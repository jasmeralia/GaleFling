name: Build & Beta Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  prepare-tag:
    name: Prepare Release Tag
    needs: lint-and-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name || steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve existing tag
        id: resolve
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag_name="${GITHUB_REF_NAME}"
          if [[ ! "${tag_name}" == v* ]]; then
            echo "Expected a v-prefixed release tag, got '${tag_name}'"
            exit 1
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Bump patch tag
        id: bump
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            git fetch --tags --force origin
            latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
            latest="${latest:-v0.0.0}"
            version="${latest#v}"
            IFS=. read -r major minor patch <<< "${version}"
            new_tag="v${major}.${minor}.$((patch + 1))"
            echo "Attempt ${attempt}: tagging ${new_tag} (previous: ${latest})"
            if git tag -a "${new_tag}" -m "Release ${new_tag}" && git push origin "refs/tags/${new_tag}"; then
              echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "Push failed (tag may already exist); retrying after refetch"
            git tag -d "${new_tag}" 2>/dev/null || true
            if [[ "${attempt}" -eq 3 ]]; then
              echo "Failed to push a unique tag after 3 attempts"
              exit 1
            fi
          done

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Lint
        run: make lint

      - name: Test with coverage
        run: |
          python -m pytest tests/ -v -m "not functional" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml:coverage.xml \
            --junitxml=junit.xml \
            -o junit_family=legacy

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: ${{ env.CODECOV_TOKEN != '' }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          verbose: true
          fail_ci_if_error: false

      - name: Upload test results
        uses: codecov/codecov-action@v6
        if: ${{ env.CODECOV_TOKEN != '' && !cancelled() }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results
          verbose: true
          fail_ci_if_error: false

  build:
    name: Build Windows Executable
    if: github.event_name != 'pull_request'
    needs: [lint-and-test, prepare-tag]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ needs.prepare-tag.outputs.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure NSIS
        shell: pwsh
        run: |
          $nsisX86 = "${env:ProgramFiles(x86)}\\NSIS\\makensis.exe"
          $nsisX64 = "${env:ProgramFiles}\\NSIS\\makensis.exe"
          if ((Test-Path $nsisX86) -or (Test-Path $nsisX64)) {
            Write-Host "NSIS already installed"
          } else {
            choco install nsis -y
          }

      - name: Build executable
        run: pyinstaller build/build.spec --distpath dist/ --workpath build/tmp

      - name: Build installer
        shell: pwsh
        run: |
          $nsis = "${env:ProgramFiles(x86)}\\NSIS\\makensis.exe"
          if (-not (Test-Path $nsis)) {
            $nsis = "${env:ProgramFiles}\\NSIS\\makensis.exe"
          }
          & $nsis build\\installer.nsi

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ needs.prepare-tag.outputs.tag_name }}".TrimStart("v")
          Compress-Archive -Path dist/GaleFling.exe -DestinationPath "dist/GaleFling-${version}-portable.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: |
            build/GaleFling-Setup-*.exe

  release:
    name: Create Beta Release
    if: github.event_name != 'pull_request'
    needs: [prepare-tag, lint-and-test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare-tag.outputs.tag_name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: .
          merge-multiple: true

      - name: Remove portable zip
        run: |
          find . -name "*-portable.zip" -delete

      - name: List release assets
        run: |
          echo "Installer assets found:"
          find . -name "GaleFling-Setup-*.exe" -print

      - name: Generate release notes from commits
        id: release_notes
        run: |
          # Find the previous release tag (including prereleases, excluding current)
          PREV_TAG=$(python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ.get("GITHUB_REPOSITORY")
          current = os.environ.get("CURRENT_TAG", "")
          url = f"https://api.github.com/repos/{repo}/releases?per_page=20"

          tag = ""
          try:
              with urllib.request.urlopen(url, timeout=10) as resp:
                  data = json.load(resp)
              for release in data:
                  if release.get("draft"):
                      continue
                  rel_tag = release.get("tag_name", "")
                  if rel_tag and rel_tag != current:
                      tag = rel_tag
                      break
          except Exception:
              tag = ""

          if not tag:
              tags = os.popen("git tag --sort=-v:refname").read().strip().splitlines()
              for rel_tag in tags:
                  if rel_tag and rel_tag != current:
                      tag = rel_tag
                      break

          print(tag)
          PY
          )
          CURRENT_TAG="${{ needs.prepare-tag.outputs.tag_name }}"

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            # First tag - use all commits
            git log --pretty=format:"- %s (%h)" HEAD >/dev/null
          else
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${CURRENT_TAG}" >/dev/null
          fi

          # Extract changelog sections between current tag and last published release
          CHANGELOG_SECTION=""
          if [ -f CHANGELOG.md ]; then
            CHANGELOG_SECTION=$(python scripts/release_notes.py)
          fi

          # Build the body
          {
            echo "body<<RELEASE_EOF"
            if [ -n "$CHANGELOG_SECTION" ]; then
              echo "## What's Changed"
              echo ""
              echo "$CHANGELOG_SECTION"
              echo ""
            fi
            echo "---"
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"
        env:
          CURRENT_TAG: ${{ needs.prepare-tag.outputs.tag_name }}

      - name: Create beta release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: true
          name: "${{ needs.prepare-tag.outputs.tag_name }} - GaleFling"
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            **/GaleFling-Setup-*.exe
