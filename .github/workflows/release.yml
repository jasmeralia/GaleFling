name: CI / Build & Beta Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release:
        description: 'Create tag and publish a release (master or an existing tag only)'
        type: boolean
        default: false

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve Release Info
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.r.outputs.is_release }}
      create_tag: ${{ steps.r.outputs.create_tag }}
      tag_name: ${{ steps.r.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Resolve release info
        id: r
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_RELEASE: ${{ inputs.release }}
        run: python3 scripts/release_info.py

  lint-and-test:
    name: Lint & Test
    needs: resolve
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: make deps

      - name: Lint
        run: make lint

      - name: Test with coverage
        run: make test-cov

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: ${{ env.CODECOV_TOKEN != '' }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          verbose: true
          fail_ci_if_error: false

      - name: Upload test results
        uses: codecov/codecov-action@v7
        if: ${{ env.CODECOV_TOKEN != '' && !cancelled() }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results
          verbose: true
          fail_ci_if_error: false

  create-tag:
    name: Create Release Tag
    if: needs.resolve.outputs.is_release == 'true'
    needs: [resolve, lint-and-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ needs.resolve.outputs.tag_name }}
      tag_sha: ${{ steps.tag.outputs.tag_sha }}
    env:
      TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.create_tag == 'true' && 'master' || format('refs/tags/{0}', needs.resolve.outputs.tag_name) }}

      - name: Create or resolve tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ needs.resolve.outputs.create_tag }}" != "true" ]]; then
            echo "tag_sha=$(git rev-parse refs/tags/${TAG_NAME})" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          commit_sha=$(git rev-parse HEAD)
          gh api "repos/${{ github.repository }}/git/refs" \
            --method POST \
            --field "ref=refs/tags/${TAG_NAME}" \
            --field "sha=${commit_sha}"
          echo "tag_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Windows Executable
    if: needs.resolve.outputs.is_release == 'true'
    needs: [resolve, create-tag]
    runs-on: windows-latest
    env:
      TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Write release version file
        shell: bash
        run: python scripts/write_version.py --tag "${TAG_NAME}"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure NSIS
        shell: pwsh
        run: |
          $nsisX86 = "${env:ProgramFiles(x86)}\\NSIS\\makensis.exe"
          $nsisX64 = "${env:ProgramFiles}\\NSIS\\makensis.exe"
          if ((Test-Path $nsisX86) -or (Test-Path $nsisX64)) {
            Write-Host "NSIS already installed"
          } else {
            choco install nsis -y
          }

      - name: Build executable
        run: pyinstaller build/build.spec --distpath dist/ --workpath build/tmp

      - name: Build installer
        shell: pwsh
        run: |
          $nsis = "${env:ProgramFiles(x86)}\\NSIS\\makensis.exe"
          if (-not (Test-Path $nsis)) {
            $nsis = "${env:ProgramFiles}\\NSIS\\makensis.exe"
          }
          & $nsis build\\installer.nsi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: build/GaleFling-Setup-*.exe

  release:
    name: Create Beta Release
    if: needs.resolve.outputs.is_release == 'true'
    needs: [resolve, create-tag, build]
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.TAG_NAME }}

      - name: Download build artifacts
        run: gh run download "$GITHUB_RUN_ID" --name windows-build --dir .
        env:
          GH_TOKEN: ${{ github.token }}

      - name: List release assets
        run: |
          echo "Installer assets found:"
          find . -name "GaleFling-Setup-*.exe" -print

      - name: Create beta release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: true
          tag_name: ${{ env.TAG_NAME }}
          name: "${{ env.TAG_NAME }} - GaleFling"
          generate_release_notes: true
          files: |
            **/GaleFling-Setup-*.exe
