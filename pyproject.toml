[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]
ignore = [
    "E501",   # line too long - handled by formatter
    "SIM108", # ternary operator - readability preference
]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.ruff.format]
quote-style = "single"

[tool.mypy]
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = ["imageio_ffmpeg", "ffmpeg"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
markers = [
    "functional: requires real credentials and network access",
]
filterwarnings = [
    "ignore:Use 'content=<\\.\\.\\.>' to upload raw bytes/text content:DeprecationWarning:httpx._models",
    "ignore:'imghdr' is deprecated:DeprecationWarning:tweepy.api",
]
